services:
  postgres:
    image: postgres:16
    container_name: gestion-permisos-p27-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gestion_permisos_p27}
      POSTGRES_USER: ${POSTGRES_USER:-gp27_owner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cambiar_en_entorno}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
